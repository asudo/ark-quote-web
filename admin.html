<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者設定 | 見積Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="menu_style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container px-4">
            <div class="d-flex align-items-center">
                <div style="width: 40px; height: 40px; background: #f5f3ff; color: #6f42c1; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #e9ecef;"
                    class="me-3">
                    <i class="fa-solid fa-user-shield fs-5"></i>
                </div>
                <div>
                    <span class="fw-bold text-dark fs-5 d-block">管理者設定</span>
                    <span class="text-muted" style="font-size: 0.75rem;">ユーザー権限の管理</span>
                </div>
            </div>
            <div class="ms-auto">
                <a href="menu.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="fa-solid fa-house me-1"></i> メインメニューに戻る
                </a>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0 text-muted">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="userSearchInput" class="form-control border-start-0 ps-0"
                        placeholder="名前やメールで検索...">
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 border-bottom d-flex align-items-center justify-content-between">
                <h5 class="mb-0 fw-bold"><i class="fa-solid fa-users me-2 text-secondary"></i>ユーザーリスト</h5>
                <span class="badge bg-light text-dark border fw-normal" id="userCountBadge">--- 名</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light small text-muted text-uppercase">
                            <tr>
                                <th class="ps-4">名前</th>
                                <th>イニシャル</th>
                                <th>メールアドレス</th>
                                <th style="width: 180px;">権限設定</th>
                                <th style="width: 100px;" class="text-center">状態</th>
                                <th style="width: 150px;" class="text-center">最終更新</th>
                            </tr>
                        </thead>
                        <tbody id="userListBody">
                            <tr>
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="fa-solid fa-spinner fa-spin me-2"></i> 読み込み中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="admin.js"></script>
</body>

</html>
