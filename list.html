<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見積一覧 | 見積Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="menu_style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand navbar-light bg-white sticky-top shadow-sm py-3"
        style="border-bottom: 1px solid #e2e8f0;">
        <div class="container px-4">
            <div class="d-flex align-items-center">
                <div style="width: 40px; height: 40px; background: #f1f5f9; color: #475569; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0;"
                    class="me-3">
                    <i class="fa-solid fa-list-ul fs-5 text-secondary"></i>
                </div>
                <div>
                    <span class="fw-bold text-dark fs-5 d-block" style="letter-spacing: -0.02em;">見積一覧</span>
                    <span id="currentDateDisplay" class="text-muted" style="font-size: 0.75rem;">
                        <i class="fa-regular fa-calendar-check me-1"></i>0000.00.00 (---)
                    </span>
                </div>
            </div>

            <div class="ms-auto">
                <div class="dropdown">
                    <button class="btn btn-link text-decoration-none d-flex align-items-center p-0" type="button"
                        id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="text-end me-2 d-none d-sm-block">
                            <span id="userNameDisplay" class="fw-bold text-dark small d-block">読み込み中...</span>
                            <small class="text-muted" style="font-size: 0.65rem;">設定・ログアウト <i
                                    class="fa-solid fa-chevron-down ms-1" style="font-size: 0.5rem;"></i></small>
                        </div>
                        <div
                            style="width: 35px; height: 35px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <i class="fa-solid fa-user text-secondary" style="font-size: 0.9rem;"></i>
                        </div>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userDropdown">
                        <li>
                            <h6 class="dropdown-header small">アカウント設定</h6>
                        </li>
                        <li><a class="dropdown-item py-2 small" href="#"><i
                                    class="fa-solid fa-user-gear me-2 opacity-50"></i>プロフィール編集</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <button class="dropdown-item py-2 small text-danger" onclick="handleLogout()">
                                <i class="fa-solid fa-power-off me-2"></i>ログアウトする
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <main class="list-container mt-4">
        <div class="container">
            <div class="list-header-box mb-4 d-flex align-items-center justify-content-between">
                <h2 id="listTitle" class="fw-bold mb-0">見積一覧</h2>
                <a href="menu.html" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="fa-solid fa-chevron-left me-1"></i> メインメニューに戻る
                </a>
            </div>

            <div class="table-wrapper card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light text-secondary small text-uppercase fw-bold">
                            <tr>
                                <th style="width: 180px;" class="ps-4">日時</th>
                                <th>見積件名</th>
                                <th style="width: 150px;">担当者</th>
                                <th style="width: 100px;" class="text-center">状態</th>
                                <th style="width: 80px;" class="pe-4"></th>
                            </tr>
                        </thead>
                        <tbody id="estimateListBody">
                            <tr>
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="fa-solid fa-spinner fa-spin me-2"></i> データを読み込み中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center py-4 text-muted small">
        &copy; 2026 ARK CRETON Inc.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="menu.js"></script>
    <script src="list.js"></script>
</body>

</html>
